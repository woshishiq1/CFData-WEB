name: Docker Publish (Master Only)

on:
  push:
    branches:
      - master  # master 推送时更新 latest
    tags:
      - "v*"   # 任何分支（如 main）推 v* 标签时更新对应版本镜像
  workflow_dispatch: # 保留手动触发开关

env:
  REGISTRY: docker.io
  # 换成你自己的镜像名称
  IMAGE_NAME: woshi17/cfdata-web

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Master Branch
        uses: actions/checkout@v4
        with:
          # 关键：强制锁定 master，确保 go.mod 是你改好的那个版本
          ref: master

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_type == 'branch' }}
            type=ref,event=tag

      - name: Build and push Multi-Arch Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # 一次性构建并合并 amd64, arm64, armv7
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          # 禁用生成冗余的 provenance 记录，让镜像列表看起来更干净
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 缓存加速
          cache-from: type=gha
          cache-to: type=gha,mode=max
