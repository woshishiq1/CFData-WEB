name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "v1.0"
        type: string
      prerelease:
        description: "Mark release as pre-release"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Multi-Platform Binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
          # 保留你自定义的原生安卓（Termux 等环境）支持
          - goos: android
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.4"
          cache: true

      - name: Create Release Assets Directory
        run: mkdir -p release_assets

      - name: Set Build Time
        id: set-build-time
        run: |
          build_time=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S %z')
          echo "BUILD_TIME=$build_time" >> $GITHUB_OUTPUT

      - name: Set Version
        id: set-version
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${{ github.ref_name }}"
          fi
          # 保留你的版本号兜底处理，确保在分支运行或为空时表现正常
          if [[ "$version" == "main" || "$version" == "master" || -z "$version" ]]; then
            version="latest"
          fi
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Download CA Certificates
        run: |
          curl -fsSL --retry 3 --connect-timeout 10 \
            https://curl.se/ca/cacert.pem \
            -o combined_refactor/ca-certificates.crt
          cert_count=$(grep -c "BEGIN CERTIFICATE" combined_refactor/ca-certificates.crt || true)
          echo "Downloaded ${cert_count} CA certificates."

      - name: Build
        run: |
          ext="${{ matrix.ext || '' }}"
          filename="cfdata-${{ matrix.goos }}-${{ matrix.goarch }}$${ext}"
          
          # 保留你的个性化安全构建策略，针对 Android 开启 PIE 模式
          extra_flags=""
          if [ "${{ matrix.goos }}" = "android" ]; then
            extra_flags="-buildmode=pie"
          fi
          
          echo "Building ${filename}..."
          cd combined_refactor
          go build $extra_flags -ldflags "-s -w -X main.appVersion=${{ steps.set-version.outputs.VERSION }}" -o ../release_assets/${filename} .
        env:
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
          CGO_ENABLED: 0
          GODEBUG: netdns=go

      - name: Generate SHA256
        run: |
          cd release_assets
          rm -f *.sha256
          for file in $(find . -type f ! -name '*.sha256'); do
            sha256sum "$file" | awk '{print $1}' > "${file}.sha256"
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}
          path: release_assets/*

  android-apk:
    name: Android APK App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.4"
          cache-dependency-path: combined_refactor/go.sum

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Set Version
        id: set-version
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${{ github.ref_name }}"
          fi
          if [[ "$version" == "main" || "$version" == "master" || -z "$version" ]]; then
            version="latest"
          fi
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Download CA Certificates
        run: |
          curl -fsSL --retry 3 --connect-timeout 10 \
            https://curl.se/ca/cacert.pem \
            -o combined_refactor/ca-certificates.crt

      - name: Build Android backend
        working-directory: combined_refactor
        env:
          GOOS: android
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-s -w -X main.appVersion=${{ steps.set-version.outputs.VERSION }}" -o ../app/src/main/jniLibs/arm64-v8a/libcfdata.so .

      - name: Prepare Release Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is required for release APK signing."
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/cfdata-release.keystore"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/cfdata-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ steps.set-version.outputs.VERSION }}
        run: gradle assembleRelease --no-daemon

      - name: Verify APK Contains Backend
        run: |
          unzip -l app/build/outputs/apk/release/app-release.apk | tee apk-contents.txt
          grep -q "lib/arm64-v8a/libcfdata.so" apk-contents.txt
          unzip -l app/build/outputs/apk/release/app-release.apk "lib/arm64-v8a/libcfdata.so"

      - name: Prepare APK Asset
        run: |
          mkdir -p release_assets
          cp app/build/outputs/apk/release/app-release.apk release_assets/cfdata-android-arm64.apk
          cd release_assets
          sha256sum cfdata-android-arm64.apk | awk '{print $1}' > cfdata-android-arm64.apk.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-android-arm64-apk
          path: release_assets/*

  release:
    name: Release
    needs: [build, android-apk] # 必须等待多平台二进制和 Android APK 两个任务同时跑完
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 引入上游改动：获取完整历史以用于生成 changelog

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: asset-*
          merge-multiple: true

      - name: Get version
        id: get-version
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${{ github.ref_name }}"
          fi
          if [[ "$version" == "main" || "$version" == "master" || -z "$version" ]]; then
            version="latest"
          fi
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Get build time
        id: get-time
        run: |
          build_time=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S %z')
          echo "BUILD_TIME=$build_time" >> $GITHUB_OUTPUT

      # 引入上游核心更新：自动生成包含差异链接和 Commit 日志的 Changelog
      - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get-version.outputs.VERSION }}
          CURRENT_SHA: ${{ github.sha }}
          CURRENT_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' || contains(steps.get-version.outputs.VERSION, '-') }}
        run: |
          git fetch --tags --force

          previous_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases" \
            --jq '[.[] | select(.draft == false and .tag_name != env.VERSION and (env.CURRENT_PRERELEASE == "true" or .prerelease == false))][0].tag_name // ""')"

          if [ -n "$previous_tag" ] && git rev-parse "$previous_tag^{commit}" >/dev/null 2>&1; then
            changelog="$(git log --no-merges --pretty=format:'- %s (%h)' "$previous_tag..$CURRENT_SHA")"
            if [ -z "$changelog" ]; then
              changelog="- 本次没有新增提交"
            fi
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${VERSION}"
            compare_link="[${previous_tag}...${VERSION}](${compare_url})"
          else
            previous_tag=""
            compare_url=""
            compare_link="无"
            changelog="- 首次发布，未找到上一个 Release 基准"
          fi

          {
            echo "PREVIOUS_TAG=$previous_tag"
            echo "COMPARE_URL=$compare_url"
            echo "COMPARE_LINK=$compare_link"
            echo "CHANGELOG<<EOF"
            printf '%s\n' "$changelog"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-version.outputs.VERSION }}
          target_commitish: ${{ github.sha }}
          name: "CFData-WEB Release ${{ steps.get-version.outputs.VERSION }}"
          # 完美融合：将上游的自动变更内容与你原本的双语环境说明合二为一
          body: |
            ## ${{ steps.get-version.outputs.VERSION }} 发布说明 / Release Notes

            - **构建时间 / Built Time:** ${{ steps.get-time.outputs.BUILD_TIME }}
            - **构建方式 / Built with:** GitHub Actions
            - **上一个版本 / Previous Release:** ${{ steps.changelog.outputs.PREVIOUS_TAG || '无 / None' }}
            - **对比变更 / Compare Changes:** ${{ steps.changelog.outputs.COMPARE_LINK }}

            ### 本次变更 / Changelog
            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ### Android 使用说明 / Android Instructions
            - **原生 App 版 (Native App):** 下载 `cfdata-android-arm64.apk` 直接在手机上进行安装。
            - **Termux 命令行版 (CLI for Termux):** 请下载 `cfdata-android-arm64` 并在环境中使用。下载后需执行 `chmod +x cfdata-android-arm64` 赋予执行权限。

            ### 校验 / Checksums
            每个二进制与应用文件均附带同名的 `.sha256` 校验文件。
            Each binary and app file is accompanied by a matching `.sha256` checksum file.

            ---

            - **支持系统 / Supports:** macOS / Windows / Linux (ARM64, AMD64), Android App (APK) 与 Android (Termux) 原生命令行。
          files: artifacts/*
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' || contains(steps.get-version.outputs.VERSION, '-') }}
          allowUpdates: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
