name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "v1.0"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Create Release Assets Directory
        run: mkdir -p release_assets

      - name: Set Build Time
        id: set-build-time
        run: |
          build_time=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S %z')
          echo "BUILD_TIME=$build_time" >> $GITHUB_OUTPUT

      - name: Set Version
        id: set-version
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${{ github.ref_name }}"
          fi
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Download CA Certificates
        run: |
          curl -fsSL --retry 3 --connect-timeout 10 \
            https://curl.se/ca/cacert.pem \
            -o combined_refactor/ca-certificates.crt
          cert_count=$(grep -c "BEGIN CERTIFICATE" combined_refactor/ca-certificates.crt || true)
          echo "Downloaded ${cert_count} CA certificates before build."

      - name: Build
        run: |
          ext="${{ matrix.ext || '' }}"
          filename="cfdata-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          echo "Building ${filename}..."
          cd combined_refactor
          go build -ldflags "-s -w -X main.appVersion=${{ steps.set-version.outputs.VERSION }}" -o ../release_assets/${filename} .
        env:
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}

      - name: Generate SHA256
        run: |
          cd release_assets
          for file in *.sha256; do rm -f "$file"; done
          for file in $(find . -type f ! -name '*.sha256'); do
            sha256sum "$file" | awk '{print $1}' > "${file}.sha256"
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}
          path: release_assets/*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: asset-*
          merge-multiple: true

      - name: Get version
        id: get-version
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${{ github.ref_name }}"
          fi
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Get build time
        id: get-time
        run: |
          build_time=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S %z')
          echo "BUILD_TIME=$build_time" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-version.outputs.VERSION }}
          name: "CFData-WEB Release ${{ steps.get-version.outputs.VERSION }}"
          body: |
            ## ${{ steps.get-version.outputs.VERSION }} 中文说明

            构建时间：${{ steps.get-time.outputs.BUILD_TIME }}

            构建方式：GitHub Actions

            采用 GitHub Actions 自动构建。

            支持 macOS / Windows / Linux（ARM64、AMD64）。

            Android 等非标准 Linux 环境可尝试使用 Linux 版本运行。

            ---

            ## ${{ steps.get-version.outputs.VERSION }} English Notes

            Built Time: ${{ steps.get-time.outputs.BUILD_TIME }}

            Built with: GitHub Actions

            Automatically built via GitHub Actions.

            Supports macOS / Windows / Linux (ARM64, AMD64).

            Android and other non-standard Linux environments can try the Linux version.
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(steps.get-version.outputs.VERSION, '-') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
