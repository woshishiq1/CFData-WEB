name: Docker Build & Download Artifacts

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:     # 手动触发
  # schedule:
  #   - cron: '00 1 * * *'   # 需要时取消注释，每天自动构建

env:
  IMAGE_NAME: cfdata-web

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            tag: amd64
          - platform: linux/arm64
            tag: arm64
          - platform: linux/arm/v7
            tag: armv7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.platform }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image to tar
        run: |
          docker save -o cfdata-web-${{ matrix.tag }}.tar ${{ env.IMAGE_NAME }}:${{ matrix.tag }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfdata-web-${{ matrix.tag }}
          path: cfdata-web-${{ matrix.tag }}.tar
          retention-days: 7        # 保留7天，可自行修改
